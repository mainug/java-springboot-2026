<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${board.title} + ' - WebBoard'">
      WebBoard - 게시글 상세
    </title>
    <style>
      :root {
        --primary-color: #4a90e2;
        --secondary-color: #f5f7fa;
        --text-color: #333;
        --accent-color: #ff6b6b;
        --white: #ffffff;
        --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        --border-color: #e1e4e8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        color: var(--text-color);
        background-color: var(--secondary-color);
      }

      header {
        background-color: var(--white);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: var(--shadow);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .logo {
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--primary-color);
        text-decoration: none;
      }

      nav ul {
        display: flex;
        list-style: none;
      }

      nav ul li {
        margin-left: 1.5rem;
      }

      nav ul li a {
        text-decoration: none;
        color: var(--text-color);
        font-weight: 500;
        transition: color 0.3s ease;
      }

      nav ul li a:hover {
        color: var(--primary-color);
      }

      .container {
        max-width: 800px;
        margin: 3rem auto;
        padding: 0 2rem;
      }

      .article-container {
        background-color: var(--white);
        border-radius: 12px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .article-header {
        padding: 2.5rem 2.5rem 1.5rem;
        border-bottom: 1px solid var(--border-color);
      }

      .article-title {
        font-size: 2rem;
        color: var(--text-color);
        margin-bottom: 1rem;
        line-height: 1.3;
      }

      .article-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #777;
        font-size: 0.9rem;
      }

      .article-meta .info span {
        margin-right: 15px;
      }

      .article-body {
        padding: 2.5rem;
        min-height: 300px;
        font-size: 1.1rem;
        color: #444;
        white-space: pre-wrap; /* 줄바꿈 유지 */
      }

      .article-footer {
        padding: 1.5rem 2.5rem;
        background-color: #f9fbff;
        border-top: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
      }

      .btn {
        display: inline-block;
        padding: 0.6rem 1.2rem;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.2s ease;
        cursor: pointer;
        border: none;
      }

      .btn-list {
        background-color: #e2e8f0;
        color: #4a5568;
      }

      .btn-list:hover {
        background-color: #cbd5e0;
      }

      .btn-edit {
        background-color: var(--primary-color);
        color: var(--white);
        margin-right: 8px;
      }

      .btn-edit:hover {
        background-color: #357abd;
      }

      .btn-delete {
        background-color: var(--accent-color);
        color: var(--white);
      }

      .btn-delete:hover {
        background-color: #ff5252;
      }

      footer {
        text-align: center;
        padding: 2rem;
        margin-top: 5rem;
        color: #888;
        font-size: 0.9rem;
        border-top: 1px solid var(--border-color);
      }

      /* 게시글 번호 뱃지 스타일 */
      .bno-badge {
        display: inline-block;
        background-color: var(--primary-color);
        color: white;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 0.8rem;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/home" class="logo">WebBoard</a>
      <nav>
        <ul>
          <li><a href="/home">홈</a></li>
          <li><a href="/board/list">게시판</a></li>
          <li><a href="#">문의하기</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <article class="article-container">
        <div class="article-header">
          <span class="bno-badge" th:text="'No. ' + ${board.bno}">No. 1</span>
          <h1 class="article-title" th:text="${board.title}">
            게시글 제목입니다.
          </h1>
          <div class="article-meta">
            <div class="info">
              <span
                >작성일:
                <strong
                  th:text="${#temporals.format(board.createDate, 'yyyy-MM-dd HH:mm')}"
                  >2026-04-10 12:00</strong
                ></span
              >
              <span th:if="${board.modifyDate != null}"
                >수정일:
                <strong
                  th:text="${#temporals.format(board.modifyDate, 'yyyy-MM-dd HH:mm')}"
                  >2026-04-10 12:00</strong
                ></span
              >
            </div>
          </div>
        </div>

        <div class="article-body" th:text="${board.content}">
          게시글 본문 내용이 여기에 표시됩니다.
        </div>

        <div class="article-footer">
          <a href="/board/list" class="btn btn-list">목록으로</a>
          <div class="action-buttons">
            <a href="#" class="btn btn-edit">수정</a>
            <a href="#" class="btn btn-delete">삭제</a>
          </div>
        </div>
      </article>
    </main>

    <footer>
      <p>&copy; 2026 WebBoard Project. All rights reserved.</p>
    </footer>
  </body>
</html>
