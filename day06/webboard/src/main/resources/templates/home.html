<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <body>
    <div th:fragment="content" class="text-center">
      <h3 class="fw-bold mt-4">안녕하세요! 👋</h3>
      <p class="text-muted mb-5">게시판 프로젝트에 오신 것을 환영합니다.</p>

      <div class="d-grid gap-3">
        <a th:href="@{/board/list}" class="btn btn-gradient shadow"
          >게시판 구경하기</a
        >
      </div>

      <div class="mt-5 text-start">
        <h6 class="fw-bold mb-3">
          <i class="bi bi-pin-angle-fill"></i> 최근 등록된 글
        </h6>
        <ul class="list-group list-group-flush shadow-sm rounded">
          <li
            th:each="board, iter : ${boardList}"
            th:if="${iter.index < 3}"
            class="list-group-item d-flex justify-content-between align-items-center"
          >
            <a
              th:href="@{|/board/detail/${board.bno}|}"
              class="text-decoration-none text-dark small"
              th:text="${board.title}"
            ></a>
            <span
              class="badge bg-light text-dark fw-normal"
              th:text="${#temporals.format(board.createDate, 'MM-dd')}"
            ></span>
          </li>
        </ul>
      </div>
    </div>
  </body>
</html>
