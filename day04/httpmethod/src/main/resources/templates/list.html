<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Student List</title>
    <style>
      :root {
        --primary-color: #4f46e5;
        --primary-hover: #4338ca;
        --bg-color: #f9fafb;
        --card-bg: #ffffff;
        --text-main: #111827;
        --text-sub: #6b7280;
        --border-color: #e5e7eb;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      .container {
        width: 100%;
        max-width: 800px;
        background: var(--card-bg);
        padding: 32px;
        border-radius: 12px;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        border-bottom: 2px solid var(--bg-color);
        padding-bottom: 16px;
      }

      h1 {
        font-size: 1.5rem;
        margin: 0;
        color: var(--text-main);
      }

      .btn-create {
        background-color: var(--primary-color);
        color: white;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 8px;
        font-weight: 500;
        font-size: 0.875rem;
        transition: background-color 0.2s;
      }

      .btn-create:hover {
        background-color: var(--primary-hover);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }

      th {
        text-align: left;
        padding: 12px 16px;
        background-color: #f3f4f6;
        color: var(--text-sub);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      td {
        padding: 16px;
        border-bottom: 1px solid var(--border-color);
        font-size: 0.95rem;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:hover {
        background-color: #fdfdfd;
      }

      .empty-state {
        text-align: center;
        padding: 48px 0;
        color: var(--text-sub);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Student Directory</h1>
        <a th:href="@{/students/create}" class="btn-create">+ Add Student</a>
      </div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Age</th>
          </tr>
        </thead>
        <tbody>
          <!-- Iterate over students list -->
          <tr th:each="student : ${students}">
            <td th:text="${student.name}">Name</td>
            <td th:text="${student.age}">Age</td>
          </tr>
          <!-- Show message if list is empty -->
          <tr th:if="${#lists.isEmpty(students)}">
            <td colspan="2" class="empty-state">No students registered yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
