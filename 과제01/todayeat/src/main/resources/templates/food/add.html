<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>오늘 뭐 먹지? 목록</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        background: linear-gradient(180deg, #fff8f0 0%, #f7f9fc 100%);
        color: #222;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 48px 20px 100px;
      }

      .page-header {
        margin-bottom: 24px;
      }

      .page-title {
        margin: 0;
        font-size: 32px;
        font-weight: 800;
        color: #222;
      }

      .page-subtitle {
        margin-top: 10px;
        color: #666;
        font-size: 15px;
      }

      .card {
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: #fff3e8;
      }

      th {
        padding: 18px 14px;
        font-size: 14px;
        font-weight: 700;
        color: #444;
        text-align: center;
        border-bottom: 1px solid #f0e2d4;
        white-space: nowrap;
      }

      td {
        padding: 16px 14px;
        font-size: 14px;
        text-align: center;
        border-bottom: 1px solid #f3f3f3;
        vertical-align: middle;
      }

      tbody tr:hover {
        background: #fffaf5;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      .food-name {
        font-weight: 700;
        color: #222;
      }

      .category-badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #f4f6f8;
        font-size: 13px;
        font-weight: 700;
        color: #555;
      }

      .rating {
        color: #ffb400;
        font-size: 15px;
        letter-spacing: 1px;
      }

      .memo {
        max-width: 260px;
        margin: 0 auto;
        color: #555;
        word-break: keep-all;
      }

      .empty-box {
        padding: 70px 20px;
        text-align: center;
      }

      .empty-title {
        font-size: 22px;
        font-weight: 800;
        color: #333;
        margin-bottom: 10px;
      }

      .empty-text {
        color: #777;
        font-size: 15px;
      }

      .fab {
        position: fixed;
        right: 28px;
        bottom: 28px;
        width: 68px;
        height: 68px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff8a3d, #ff5e57);
        color: #fff;
        font-size: 38px;
        font-weight: 500;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 28px rgba(255, 94, 87, 0.35);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        z-index: 1000;
      }

      .fab:hover {
        transform: translateY(-2px) scale(1.04);
        box-shadow: 0 16px 32px rgba(255, 94, 87, 0.42);
      }

      .fab:active {
        transform: scale(0.98);
      }

      @media (max-width: 768px) {
        .container {
          padding: 28px 14px 90px;
        }

        .page-title {
          font-size: 26px;
        }

        th,
        td {
          padding: 13px 10px;
          font-size: 13px;
        }

        .memo {
          max-width: 180px;
          font-size: 13px;
        }

        .fab {
          width: 60px;
          height: 60px;
          right: 18px;
          bottom: 18px;
          font-size: 34px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">오늘 뭐 먹지? 기록장</h1>
        <div class="page-subtitle">먹었던 음식들을 날짜별로 정리해보세요.</div>
      </div>

      <div class="card" th:if="${!#lists.isEmpty(foods)}">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>번호</th>
                <th>음식명</th>
                <th>카테고리</th>
                <th>평점</th>
                <th>날짜</th>
                <th>메모</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="food : ${foods}">
                <td th:text="${food.id}">1</td>
                <td class="food-name" th:text="${food.name}">비빔밥</td>
                <td>
                  <span class="category-badge" th:text="${food.category}">한식</span>
                </td>
                <td class="rating" th:text="${'★'.repeat(food.rating)}">★★★★★</td>
                <td th:text="${food.eatDate}">2026-04-21</td>
                <td>
                  <div class="memo" th:text="${food.memo}">맛있어요</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card empty-box" th:if="${#lists.isEmpty(foods)}">
        <div class="empty-title">아직 기록된 음식이 없습니다</div>
        <div class="empty-text">우측 하단의 + 버튼을 눌러 첫 음식을 등록해보세요.</div>
      </div>
    </div>

    <a class="fab" th:href="@{/food/add}" title="음식 추가">+</a>
  </body>
</html>
