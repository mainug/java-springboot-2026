<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="header">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PKNU26 WebBoard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* 배경 그라데이션 - 보내주신 로그인 이미지 느낌 */
      body {
        background: linear-gradient(
          135deg,
          #00f2fe 0%,
          #4facfe 50%,
          #f093fb 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center; /* 수직 중앙 */
        justify-content: center; /* 수평 중앙 */
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
      }

      /* 중앙 화이트 박스 */
      .main-card {
        background: white;
        width: 100%;
        max-width: 600px; /* 박스 너비 제한 */
        border-radius: 30px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        padding: 50px 40px;
        min-height: 600px;
        display: flex;
        flex-direction: column;
      }

      /* 네비게이션을 박스 안으로 이동시킨 느낌의 메뉴 */
      .custom-nav {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
      }
      .custom-nav a {
        text-decoration: none;
        color: #666;
        font-weight: bold;
        font-size: 0.9rem;
        transition: 0.3s;
      }
      .custom-nav a:hover {
        color: #f093fb;
      }

      /* 버튼 그라데이션 */
      .btn-gradient {
        background: linear-gradient(to right, #00f2fe, #f093fb);
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 10px;
        padding: 12px;
        transition: 0.3s;
      }
      .btn-gradient:hover {
        opacity: 0.9;
        transform: scale(1.02);
      }

      /* 리스트 아이템 스타일 */
      .list-group-item {
        border: none;
        border-bottom: 1px solid #eee;
        padding: 15px 10px;
      }
    </style>
  </head>
  <body th:fragment="layout(content)">
    <div class="main-card">
      <div class="text-center mb-4">
        <h2 class="fw-bold mb-4">BOARD</h2>
        <div class="custom-nav">
          <a th:href="@{/home}">HOME</a>
          <a th:href="@{/board/list}">LIST</a>
          <a th:href="@{/board/create}">WRITE</a>
        </div>
      </div>

      <div class="flex-grow-1">
        <th:block th:replace="${content}"></th:block>
      </div>

      <div class="text-center mt-5">
        <p class="text-muted small">Or Sign Up Using</p>
        <div class="d-flex justify-content-center gap-2">
          <div
            style="
              width: 30px;
              height: 30px;
              border-radius: 50%;
              background: #3b5998;
            "
          ></div>
          <div
            style="
              width: 30px;
              height: 30px;
              border-radius: 50%;
              background: #1da1f2;
            "
          ></div>
          <div
            style="
              width: 30px;
              height: 30px;
              border-radius: 50%;
              background: #ea4335;
            "
          ></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
