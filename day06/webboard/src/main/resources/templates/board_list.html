<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content})}"
>
  <div th:fragment="content">
    <h4 class="fw-bold text-center mb-4">Latest Posts</h4>
    <div
      class="list-group list-group-flush shadow-sm rounded-4 overflow-hidden"
    >
      <a
        th:each="board : ${boardList}"
        th:href="@{|/board/detail/${board.bno}|}"
        class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3"
      >
        <div class="text-truncate me-3">
          <span class="text-muted small me-2" th:text="${board.bno}"></span>
          <span class="fw-bold" th:text="${board.title}"></span>
        </div>
        <span
          class="badge bg-light text-muted fw-normal"
          th:text="${#temporals.format(board.createDate, 'MM-dd')}"
        ></span>
      </a>
      <div
        th:if="${#lists.isEmpty(boardList)}"
        class="list-group-item text-center py-5 text-muted"
      >
        아직 작성된 글이 없습니다.
      </div>
    </div>
    <div class="text-center mt-4">
      <a th:href="@{/board/create}" class="btn btn-main px-5">New Post</a>
    </div>
  </div>
</html>
