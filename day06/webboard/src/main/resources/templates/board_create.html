<html layout:decorate="~{layout}">
  <div layout:fragment="content">
    <h2 class="border-bottom py-2">✍️ 새 게시글 등록</h2>
    <form
      th:action="@{/board/create}"
      th:object="${boardForm}"
      method="post"
      class="mt-4 shadow-sm p-4 bg-white rounded"
    >
      <div class="mb-3">
        <label class="form-label fw-bold">제목</label>
        <input
          type="text"
          th:field="*{title}"
          class="form-control"
          th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
        />
        <div class="invalid-feedback" th:errors="*{title}"></div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">내용</label>
        <textarea
          th:field="*{content}"
          class="form-control"
          rows="10"
          th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"
        ></textarea>
        <div class="invalid-feedback" th:errors="*{content}"></div>
      </div>
      <div class="text-end border-top pt-3">
        <a th:href="@{/board/list}" class="btn btn-outline-secondary me-2"
          >목록으로</a
        >
        <button type="submit" class="btn btn-success px-4">저장하기</button>
      </div>
    </form>
  </div>
</html>
