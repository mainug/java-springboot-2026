<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="header">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PKNU26 WebBoard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        /* 이미지와 유사한 퍼플-블루 그라데이션 배경 */
        background: linear-gradient(135deg, #00dbde 0%, #fc00ff 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Noto Sans KR", sans-serif;
        margin: 0;
        padding: 20px;
      }

      /* 중앙 화이트 박스 (컨테이너) */
      .main-wrapper {
        background: #ffffff;
        width: 100%;
        max-width: 700px; /* 적절한 박스 너비 */
        border-radius: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        padding: 50px;
        position: relative;
        overflow: hidden;
      }

      /* 상단 타이틀 스타일 */
      .board-logo {
        font-weight: 700;
        font-size: 2.2rem;
        color: #333;
        margin-bottom: 30px;
        text-align: center;
      }

      /* 네비게이션 메뉴 버튼화 */
      .nav-group {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 40px;
      }
      .nav-group a {
        text-decoration: none;
        color: #888;
        font-weight: 500;
        padding: 8px 16px;
        border-radius: 20px;
        transition: 0.3s;
        background: #f8f9fa;
      }
      .nav-group a:hover {
        background: #eee;
        color: #fc00ff;
      }

      /* 버튼 그라데이션 (이미지 버튼 스타일) */
      .btn-main {
        background: linear-gradient(to right, #00dbde, #fc00ff);
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 25px;
        padding: 12px 30px;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .btn-main:hover {
        opacity: 0.9;
        transform: translateY(-2px);
        color: white;
      }

      /* 입력창 스타일 */
      .form-control {
        border: none;
        border-bottom: 2px solid #eee;
        border-radius: 0;
        padding: 12px 5px;
        margin-bottom: 10px;
      }
      .form-control:focus {
        box-shadow: none;
        border-bottom-color: #fc00ff;
      }
    </style>
  </head>
  <body th:fragment="layout(content)">
    <div class="main-wrapper">
      <div class="board-logo">BOARD</div>
      <div class="nav-group">
        <a th:href="@{/home}">HOME</a>
        <a th:href="@{/board/list}">LIST</a>
        <a th:href="@{/board/create}">WRITE</a>
      </div>

      <div class="content-body">
        <th:block th:replace="${content}"></th:block>
      </div>

      <div class="text-center mt-5">
        <p class="text-muted small mb-3">PKNU26 Web Project</p>
        <div class="d-flex justify-content-center gap-3">
          <div
            style="
              width: 12px;
              height: 12px;
              border-radius: 50%;
              background: #00dbde;
            "
          ></div>
          <div
            style="
              width: 12px;
              height: 12px;
              border-radius: 50%;
              background: #fc00ff;
            "
          ></div>
          <div
            style="
              width: 12px;
              height: 12px;
              border-radius: 50%;
              background: #888;
            "
          ></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
