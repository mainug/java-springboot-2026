<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Add New Movie</title>
    <style>
      body {
        font-family: "Pretendard", sans-serif;
        padding: 50px;
        background-color: #fff;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        font-size: 24px;
        border-bottom: 2px solid #000;
        padding-bottom: 20px;
        margin-bottom: 40px;
      }

      .form-group {
        margin-bottom: 25px;
      }
      label {
        display: block;
        font-weight: bold;
        margin-bottom: 10px;
        font-size: 14px;
      }
      input[type="text"],
      input[type="number"],
      input[type="date"],
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 15px;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: #000;
      }
      textarea {
        height: 120px;
        resize: vertical;
      }

      .row {
        display: flex;
        gap: 20px;
      }
      .row .form-group {
        flex: 1;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 40px;
      }
      .btn {
        padding: 15px 25px;
        font-size: 16px;
        font-weight: bold;
        border: none;
        cursor: pointer;
        flex: 1;
      }
      .btn-submit {
        background: #000;
        color: #fff;
      }
      .btn-cancel {
        background: #eee;
        color: #333;
        text-decoration: none;
        text-align: center;
      }
      .btn:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>영화 정보 입력</h1>
      <form th:action="@{/movies/new}" th:object="${movie}" method="post">
        <div class="form-group">
          <label>영화 제목 *</label>
          <input
            type="text"
            th:field="*{title}"
            placeholder="한국어 제목을 입력하세요"
            required
          />
        </div>

        <div class="form-group">
          <label>원제 (Original Title)</label>
          <input
            type="text"
            th:field="*{originalTitle}"
            placeholder="영문 제목 등을 입력하세요"
          />
        </div>

        <div class="row">
          <div class="form-group">
            <label>감독</label>
            <input type="text" th:field="*{director}" placeholder="감독명" />
          </div>
          <div class="form-group">
            <label>장르</label>
            <input
              type="text"
              th:field="*{genre}"
              placeholder="예: 액션, 드라마"
            />
          </div>
        </div>

        <div class="form-group">
          <label>출연 배우</label>
          <input
            type="text"
            th:field="*{actors}"
            placeholder="배우 이름을 콤마(,)로 구분하여 입력"
          />
        </div>

        <div class="row">
          <div class="form-group">
            <label>상영 시간 (분)</label>
            <input
              type="number"
              th:field="*{runningTime}"
              placeholder="예: 120"
            />
          </div>
          <div class="form-group">
            <label>평점</label>
            <input
              type="number"
              step="0.1"
              min="0"
              max="10"
              th:field="*{rating}"
              placeholder="0.0 ~ 10.0"
            />
          </div>
        </div>

        <div class="form-group">
          <label>개봉일</label>
          <input type="date" th:field="*{releaseDate}" />
        </div>

        <div class="form-group">
          <label>시놉시스 (설명)</label>
          <textarea
            th:field="*{description}"
            placeholder="영화의 주요 줄거리를 입력하세요"
          ></textarea>
        </div>

        <div class="btn-group">
          <a th:href="@{/movies}" class="btn btn-cancel">취소</a>
          <button type="submit" class="btn btn-submit">등록 완료</button>
        </div>
      </form>
    </div>
  </body>
</html>
