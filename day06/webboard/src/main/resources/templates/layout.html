<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="header">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PKNU26 Board</title>
    <style>
      /* 1. 배경 설정: 이미지의 그라데이션 재현 */
      body {
        margin: 0;
        padding: 0;
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          Roboto,
          sans-serif;
        background: linear-gradient(135deg, #00dbde 0%, #fc00ff 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 2. 중앙 화이트 박스 */
      .glass-card {
        background: #ffffff;
        width: 90%;
        max-width: 500px;
        padding: 60px 40px;
        border-radius: 25px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        box-sizing: border-box;
        text-align: center;
      }

      /* 3. 로고 및 상단 메뉴 */
      .title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 30px;
        color: #333;
        letter-spacing: -1px;
      }
      .nav-links {
        margin-bottom: 40px;
      }
      .nav-links a {
        text-decoration: none;
        color: #aaa;
        margin: 0 10px;
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.3s;
      }
      .nav-links a:hover {
        color: #fc00ff;
      }

      /* 4. 버튼 그라데이션 (이미지 버튼 스타일) */
      .btn-submit {
        width: 100%;
        background: linear-gradient(to right, #00dbde, #fc00ff);
        border: none;
        color: white;
        padding: 15px;
        border-radius: 30px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(252, 0, 255, 0.3);
        transition: 0.3s;
        margin-top: 20px;
      }
      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(252, 0, 255, 0.4);
      }

      /* 5. 입력창 스타일 (선으로 된 디자인) */
      .input-group {
        text-align: left;
        margin-bottom: 25px;
      }
      .input-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: bold;
        color: #666;
        margin-bottom: 5px;
      }
      .input-group input,
      .input-group textarea {
        width: 100%;
        border: none;
        border-bottom: 2px solid #eee;
        padding: 10px 0;
        outline: none;
        font-size: 1rem;
        box-sizing: border-box;
        transition: 0.3s;
      }
      .input-group input:focus,
      .input-group textarea:focus {
        border-bottom-color: #fc00ff;
      }

      /* 6. 리스트 스타일 */
      .board-list {
        list-style: none;
        padding: 0;
        margin: 0;
        text-align: left;
      }
      .board-item {
        padding: 15px 0;
        border-bottom: 1px solid #f5f5f5;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .board-item a {
        text-decoration: none;
        color: #333;
        font-weight: 500;
      }
      .board-item .date {
        font-size: 0.8rem;
        color: #bbb;
      }
    </style>
  </head>
  <body th:fragment="layout(content)">
    <div class="glass-card shadow">
      <div class="title">BOARD</div>
      <div class="nav-links">
        <a th:href="@{/home}">HOME</a>
        <a th:href="@{/board/list}">LIST</a>
        <a th:href="@{/board/create}">WRITE</a>
      </div>

      <div class="content-area">
        <th:block th:replace="${content}"></th:block>
      </div>

      <div
        style="
          margin-top: 40px;
          display: flex;
          justify-content: center;
          gap: 10px;
        "
      >
        <div
          style="
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #3b5998;
          "
        ></div>
        <div
          style="
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #1da1f2;
          "
        ></div>
        <div
          style="
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #ea4335;
          "
        ></div>
      </div>
    </div>
  </body>
</html>
